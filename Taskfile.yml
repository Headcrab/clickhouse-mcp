version: '3'

dotenv:
  - .env

vars:
  BIN: '{{if .BIN}}{{.BIN}}{{else if eq OS "windows"}}clickhouse-mcp.exe{{else}}clickhouse-mcp{{end}}'
  CLICKHOUSE_URL: '{{default "localhost:9000/default" .CLICKHOUSE_URL}}'
  CLICKHOUSE_USER: '{{default "default" .CLICKHOUSE_USER}}'
  CLICKHOUSE_PASSWORD: '{{default "clickhouse" .CLICKHOUSE_PASSWORD}}'
  CLICKHOUSE_DB: '{{default "default" .CLICKHOUSE_DB}}'
  CLICKHOUSE_MCP_PORT: '{{default "8082" .CLICKHOUSE_MCP_PORT}}'
  CLICKHOUSE_MCP_PUBLIC_BASE_URL: '{{default (printf "http://localhost:%s" .CLICKHOUSE_MCP_PORT) .CLICKHOUSE_MCP_PUBLIC_BASE_URL}}'
  CLICKHOUSE_MCP_DEFAULT_LIMIT: '{{default "100" .CLICKHOUSE_MCP_DEFAULT_LIMIT}}'
  CLICKHOUSE_MCP_MAX_LIMIT: '{{default "10000" .CLICKHOUSE_MCP_MAX_LIMIT}}'

tasks:
  default:
    desc: Показать список задач
    silent: true
    cmds:
      - task --list-all

  build:
    desc: Собрать бинарник
    cmds:
      - go build -o "{{.BIN}}" .

  run:
    desc: Запустить MCP сервер через stdio
    env:
      CLICKHOUSE_MCP_URL: '{{.CLICKHOUSE_URL}}'
      CLICKHOUSE_MCP_USER: '{{.CLICKHOUSE_USER}}'
      CLICKHOUSE_MCP_PASSWORD: '{{.CLICKHOUSE_PASSWORD}}'
      CLICKHOUSE_MCP_DB: '{{.CLICKHOUSE_DB}}'
      CLICKHOUSE_MCP_DEFAULT_LIMIT: '{{.CLICKHOUSE_MCP_DEFAULT_LIMIT}}'
      CLICKHOUSE_MCP_MAX_LIMIT: '{{.CLICKHOUSE_MCP_MAX_LIMIT}}'
    cmds:
      - go run . -transport stdio

  run:sse:
    desc: Запустить MCP сервер через SSE
    env:
      CLICKHOUSE_MCP_URL: '{{.CLICKHOUSE_URL}}'
      CLICKHOUSE_MCP_USER: '{{.CLICKHOUSE_USER}}'
      CLICKHOUSE_MCP_PASSWORD: '{{.CLICKHOUSE_PASSWORD}}'
      CLICKHOUSE_MCP_DB: '{{.CLICKHOUSE_DB}}'
      CLICKHOUSE_MCP_PORT: '{{.CLICKHOUSE_MCP_PORT}}'
      CLICKHOUSE_MCP_PUBLIC_BASE_URL: '{{.CLICKHOUSE_MCP_PUBLIC_BASE_URL}}'
      CLICKHOUSE_MCP_DEFAULT_LIMIT: '{{.CLICKHOUSE_MCP_DEFAULT_LIMIT}}'
      CLICKHOUSE_MCP_MAX_LIMIT: '{{.CLICKHOUSE_MCP_MAX_LIMIT}}'
    cmds:
      - go run . -transport sse

  run:test:
    desc: Запустить сервер в тестовом режиме
    cmds:
      - go run . -test

  fmt:
    desc: Отформатировать Go код
    cmds:
      - go fmt ./...

  vet:
    desc: Прогнать go vet
    cmds:
      - go vet ./...

  test:
    desc: Прогнать обычные тесты
    cmds:
      - go test ./...

  test:integration:
    desc: Прогнать интеграционные тесты против живого ClickHouse
    env:
      CLICKHOUSE_MCP_INTEGRATION: '1'
      CLICKHOUSE_MCP_TEST_URL: '{{.CLICKHOUSE_URL}}'
      CLICKHOUSE_MCP_TEST_USER: '{{.CLICKHOUSE_USER}}'
      CLICKHOUSE_MCP_TEST_PASSWORD: '{{.CLICKHOUSE_PASSWORD}}'
      CLICKHOUSE_MCP_TEST_DB: '{{.CLICKHOUSE_DB}}'
    cmds:
      - go test ./...

  check:
    desc: Полная локальная проверка
    deps:
      - fmt
      - vet
      - test
      - build

  docker:build:
    desc: Собрать Docker образ
    cmds:
      - docker build -t clickhouse-mcp .

  docker:up:
    desc: Поднять ClickHouse и MCP через docker compose
    cmds:
      - docker compose up -d

  docker:down:
    desc: Остановить docker compose стек
    cmds:
      - docker compose down

  docker:logs:
    desc: Показать логи docker compose
    cmds:
      - docker compose logs -f
