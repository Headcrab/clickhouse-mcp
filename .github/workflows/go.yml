name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLICKHOUSE_TEST_USER: "mcp"
  CLICKHOUSE_TEST_PASSWORD: "clickhouse"
  CLICKHOUSE_TEST_DB: "default"

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.1"
          cache: true

      - name: Start ClickHouse
        shell: bash
        run: |
          docker run -d --name clickhouse-test \
            -p 9000:9000 \
            -p 8123:8123 \
            -e CLICKHOUSE_USER=${CLICKHOUSE_TEST_USER} \
            -e CLICKHOUSE_PASSWORD=${CLICKHOUSE_TEST_PASSWORD} \
            -e CLICKHOUSE_DB=${CLICKHOUSE_TEST_DB} \
            -e CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 \
            clickhouse/clickhouse-server:24.3

          for i in $(seq 1 30); do
            if curl --fail --silent --show-error "http://127.0.0.1:8123/?user=${CLICKHOUSE_TEST_USER}&password=${CLICKHOUSE_TEST_PASSWORD}&query=SELECT%201" >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs clickhouse-test
          exit 1

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CLICKHOUSE_MCP_INTEGRATION: "1"
          CLICKHOUSE_MCP_TEST_URL: "localhost:9000/${{ env.CLICKHOUSE_TEST_DB }}"
          CLICKHOUSE_MCP_TEST_USER: "${{ env.CLICKHOUSE_TEST_USER }}"
          CLICKHOUSE_MCP_TEST_PASSWORD: "${{ env.CLICKHOUSE_TEST_PASSWORD }}"
          CLICKHOUSE_MCP_TEST_SECURE: "false"
        run: go test -v ./...

      - name: Build binary
        run: go build -v ./...

      - name: Build Docker image
        run: docker build -t clickhouse-mcp:test .
