name: Go

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"
          cache: true

      - name: Start ClickHouse
        shell: bash
        run: |
          docker run -d --name clickhouse-test \
            -p 9000:9000 \
            -p 8123:8123 \
            clickhouse/clickhouse-server:24.3

          for i in $(seq 1 30); do
            if docker exec clickhouse-test clickhouse-client --query "SELECT 1" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          docker logs clickhouse-test
          exit 1

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CLICKHOUSE_MCP_INTEGRATION: "1"
          CLICKHOUSE_MCP_TEST_URL: "localhost:9000/default"
          CLICKHOUSE_MCP_TEST_USER: "default"
          CLICKHOUSE_MCP_TEST_PASSWORD: ""
          CLICKHOUSE_MCP_TEST_SECURE: "false"
        run: go test -v ./...

      - name: Build binary
        run: go build -v ./...

      - name: Build Docker image
        run: docker build -t clickhouse-mcp:test .
